
<!-- Fragment: Email Subscription/Removal -->
<div class="email-subscription-box">
    <div class="card">
        <p>Join our mailing list or remove your address below.</p>
        <div class="input-group">
            <input type="email" id="emailInput" placeholder="your@email.com">
            <button id="subscribeBtn">Subscribe</button>
            <button id="unsubscribeBtn">Remove Me</button>
        </div>
    </div>
    <div id="emailFeedback" class="feedback-msg"></div>
</div>

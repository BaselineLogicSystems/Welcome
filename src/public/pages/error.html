
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Something Went Wrong | Baseline Logic Systems</title>
    <link rel="stylesheet" href="css/error.css">
    <style>
        body {
            font-family: var(--font-family-main);
            background-color: var(--color-bg-light);
            color: var(--color-text-main);
            display: flex; align-items: center; justify-content: center;
            height: 100vh; margin: 0; text-align: center;
        }
        .error-container { max-width: 500px; padding: 2rem; }
        h1 { color: var(--color-primary); font-size: 2rem; }
        p { color: var(--color-text-muted); margin-bottom: 2rem; }
        .btn {
            background-color: var(--color-primary); color: white;
            padding: 0.8rem 1.5rem; text-decoration: none;
            border-radius: var(--border-radius); font-weight: bold;
        }
        .btn:hover { background-color: var(--color-secondary); }
    </style>
</head>
<body>
<div class="error-container">
    <h1>Oops! Something went wrong.</h1>
    <p>We've encountered an unexpected issue. Our technical team has been notified and is looking into it. Please try refreshing the page or return to the home page.</p>
    <a href="/" class="btn">Return to Home</a>
</div>
</body>
</html>
